# Exemple règles nftables pour Pi 2 routeur (OpenWrt)
# À intégrer via LuCI > Firewall ou /etc/nftables.conf
# eth0 = LAN, eth1 = WAN ; br-iot = bridge VLAN IoT si configuré

#!/usr/sbin/nft -f
flush ruleset

define LAN_NET = 192.168.10.0/24
define IOT_NET = 192.168.30.0/24

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;
        ct state established,related accept
        iif "lo" accept
        iifname "eth0" tcp dport { 22, 80, 443 } accept
        iifname "eth0" udp dport 51820 accept
        iifname "eth0" icmp type echo-request accept
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
        ct state established,related accept
        iifname "eth0" oifname "eth1" accept
        iifname "br-iot" oifname "eth1" accept
        iifname "br-iot" oifname "eth0" drop
        iifname "eth0" oifname "br-iot" accept
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}

table inet nat {
    chain postrouting {
        type nat hook postrouting priority srcnat;
        oifname "eth1" masquerade
    }
}
