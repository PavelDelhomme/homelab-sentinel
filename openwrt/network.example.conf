# Exemple /etc/config/network pour Pi 2 (OpenWrt)
# eth0 = LAN (port natif), eth1 = WAN (dongle USB-Ethernet)
# Copier sur la Pi et adapter si besoin (adresses, device)

config interface 'loopback'
    option device 'lo'
    option proto 'static'
    option ipaddr '127.0.0.1'
    option netmask '255.0.0.0'

config interface 'wan'
    option device 'eth1'
    option proto 'dhcp'

config interface 'wan6'
    option device 'eth1'
    option proto 'dhcpv6'

config interface 'lan'
    option device 'eth0'
    option proto 'static'
    option ipaddr '192.168.10.1'
    option netmask '255.255.255.0'
